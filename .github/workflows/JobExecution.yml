name: Automation jobs

on:
  workflow_dispatch: 
    inputs:
      tag:
        description: Tag Name
        default: Teju the princess
        required: true
        type: string
      BRANCH:
        type: string
        description: 'enter branch name'
        required: false
        default: "master"
      build:
        description: build name
        default: 1.41.7
        required: false
        type: string
      run:
        description: Failed Run
        type: boolean
        default: true
        required: true
      env:
        description: Environment
        type: environment
        required: true
run-name: "Tag: ${{inputs.tag}}, Build: ${{inputs.build}}, run: ${{inputs.run}}, evn: ${{inputs.env}}"
jobs:
  raju-execution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
            ref: ${{ inputs.BRANCH }}  
      - name: Print Inputs
        run: |
          echo "Tag=${{ inputs.tag }}"
          echo "Build=${{ inputs.build }}"
          echo "Run=${{ inputs.run }}"
          echo "Environment=${{ inputs.env }}"

      - name: Run Automation
        run: |
          mvn test
      

    
  
  
